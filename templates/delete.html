<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>Delete Student</title>

    <script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-slate-100 min-h-screen flex items-center justify-center p-4">

    <!-- Card -->
    <div class="bg-white w-full max-w-md rounded-3xl shadow-2xl overflow-hidden">

        <!-- Header -->
        <div class="bg-red-500 p-6 text-center">

            <h1 class="text-3xl font-bold text-white">
                Delete Student
            </h1>

        </div>

        <!-- Content -->
        <div class="p-6 sm:p-8 text-center">

            {% if student.picture %}

            <img
                src="{{ student.picture.url }}"
                alt="{{ student.name }}"
                class="w-28 h-28 rounded-full object-cover border-4 border-red-100 mx-auto shadow-md"
            >

            {% endif %}

            <h2 class="text-2xl font-bold text-slate-700 mt-5">
                {{ student.name }}
            </h2>

            <p class="text-slate-500 mt-2">
                Student ID :
                {{ student.student_id }}
            </p>

            <p class="text-red-500 font-semibold mt-6">
                Are you sure you want to delete this student?
            </p>

            <!-- Buttons -->
            <form method="POST" class="mt-8">

                {% csrf_token %}

                <div class="flex flex-col sm:flex-row gap-4">

                    <!-- Delete -->
                    <button
                        type="submit"
                        class="w-full bg-red-500 hover:bg-red-600 text-white py-3 rounded-xl font-semibold transition"
                    >
                        Yes, Delete
                    </button>

                    <!-- Cancel -->
                    <a
                        href="{% url 'students_views' %}"
                        class="w-full bg-slate-200 hover:bg-slate-300 text-slate-700 py-3 rounded-xl font-semibold transition text-center"
                    >
                        Cancel
                    </a>

                </div>

            </form>

        </div>

    </div>

</body>

</html>
